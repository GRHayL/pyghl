name: Wheels

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            cibw_archs: x86_64
          - name: macos-x86_64
            os: macos-13
            cibw_archs: x86_64
          - name: macos-arm64
            os: macos-14
            cibw_archs: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_SKIP: "pp* *musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >
            if command -v dnf >/dev/null; then
              dnf install -y hdf5-devel pkgconf-pkg-config;
            else
              yum install -y hdf5-devel pkgconfig;
            fi
          CIBW_BEFORE_ALL_MACOS: "brew install hdf5 pkg-config"
          CIBW_BEFORE_BUILD_MACOS: "python -m pip install delocate"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs}
            -w {dest_dir} -v {wheel}
          CIBW_TEST_COMMAND: >
            python -c "import pyghl; pyghl.require_bindings();
            print('pyghl wheel ok')"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
